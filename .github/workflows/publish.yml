name: Publish NuGet Pacakges

on:
  release:
    types: [published]
  
jobs:
  publish:
    runs-on: self-hosted
    
    steps:
      - name: Download NuGet Packages from Release
        run: |
            Write-Host "GITHUB_REF: '$($env:GITHUB_REF)'"
            $prefix = "refs/tags/"
            $name = $($env:GITHUB_REF).Substring($prefix.Length)
            Write-Host "name: '$name'"
            gh release download $name --repo siemens/continuous-clearing --pattern '*.nupkg' --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Publish to github packages
        run: |
          dotnet nuget add source --username ${{ secrets.USERNAME }} --password ${{ secrets.PAT_GITHUB }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/SIEMENS/index.json"
          dotnet nuget push "*.nupkg" --api-key $env:PAT_GITHUB --source "https://nuget.pkg.github.com/SIEMENS/index.json"
        env:
         USERNAME: ${{ secrets.USERNAME }}
         GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
         PAT_GITHUB: ${{ secrets.PAT_GITHUB }}
