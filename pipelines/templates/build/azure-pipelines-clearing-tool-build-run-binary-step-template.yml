parameters:
  # Sw360 and Fossology parameters
  - name: sw360Url
    type: string
    default: ''

  - name: sw360Token
    type: string
    default: ''

  - name: sw360ProjectId
    type: string
    default: ''

  - name: sw360ProjectName
    type: string
    default: ''

  - name: fossologyUrl
    type: string
    default: ''

  # JFrog parameters
  - name: JfrogUrl
    type: string
    default: ''

  - name: JfrogToken
    type: string
    default: ''

  - name: JfrogDryRun
    type: boolean
    default: true

  # CA Tool parameters
  - name: projectDefinitions
    type: object
    default: []

  - name: outputFolder
    type: string
    default: ''
  
  # Template parameters
  - name: SITScanEnabled
    type: boolean
    default: true

  - name: SITUploadEnabled
    type: boolean
    default: true
    
  - name: appSettingsPath
    type: string
    default: ''
    
  # Template parameters for Signing sbom
  - name: keyVaultUri
    type: string
    default: $(devops--clearing-sbom-signing-vaulturl)
  
  - name: certificateName
    type: string
    default: $(devops--clearing-sbom-signing-certname)
  
  - name: clientId
    type: string
    default: $(devops--clearing-sbom-signing-clientid)
  
  - name: clientSecret
    type: string
    default: $(devops--clearing-sbom-signing-clientsecret)
    
  - name: tenantId
    type: string
    default: $(SBOMSignInTenentID) 

  - name: SBOMSignVerify
    type: boolean
    default: True

steps:
  - task: CmdLine@2
    displayName: 'Build CA Tool'
    inputs:
      script: |
        dotnet build $(Build.SourcesDirectory)/continuous-clearing/src/ContinuousClearingTool.sln --configuration Release
  
  - task: PowerShell@2
    displayName: 'Tool pre-requisite'
    inputs:
      targetType: 'inline'
      script: |
        $baseOutputPath = "${{ parameters.outputFolder }}"
        $sbomPath = Join-Path $baseOutputPath "sbom"
        $logsPath = Join-Path $baseOutputPath "logs"

        foreach ($path in @($baseOutputPath, $sbomPath, $logsPath)) {
          if (-not (Test-Path -Path $path)) {
            New-Item -ItemType Directory -Path $path | Out-Null
            Write-Host "Created directory: $path"
          } else {
            Write-Host "Directory already exists: $path"
          }
        }

  - ${{ each project in parameters.projectDefinitions }}:
    - task: PowerShell@2
      displayName: 'Run SIT.Scan for ${{ project.projectType }}'
      inputs:
        targetType: 'inline'
        script: |
          $args = @(
            "--Directory:InputFolder", "${{ project.inputFolder }}",
            "--Directory:OutputFolder", "${{ parameters.outputFolder }}/sbom",
            "--Directory:LogFolder", "${{ parameters.outputFolder }}/logs",
            "--ProjectType", "${{ project.projectType }}",
            "--SW360:ProjectName", "${{ parameters.sw360ProjectName }}",
            "--SW360:ProjectID", "${{ parameters.sw360ProjectId }}",
            "--SW360:AuthTokenType", "Token",
            "--SW360:URL", "${{ parameters.sw360Url }}",
            "--SW360:Token", "${{ parameters.sw360Token }}",
            "--SW360:Fossology:URL", "${{ parameters.fossologyUrl }}",
            "--JFrog:URL", "${{ parameters.JfrogUrl }}",
            "--Jfrog:Token", "${{ parameters.JfrogToken }}",
            "--SbomSigning:SBOMSignVerify", "${{ parameters.SBOMSignVerify }}",
            "--settingsfilepath", "${{ parameters.appSettingsPath }}"
          )
          if ('${{ parameters.SBOMSignVerify }}' -eq 'true') {
              $args += "--SbomSigning:KeyVaultUri"
              $args += "${{ parameters.keyVaultUri }}"
              $args += "--SbomSigning:CertificateName"
              $args += "${{ parameters.certificateName }}"
              $args += "--SbomSigning:ClientId"
              $args += "${{ parameters.clientId }}"
              $args += "--SbomSigning:ClientSecret"
              $args += "${{ parameters.clientSecret }}"
              $args += "--SbomSigning:TenantId"
              $args += "${{ parameters.tenantId }}"
          }
          $projectTypes = @()
          $parameters.projectDefinitions | ForEach-Object { $projectTypes += $_.projectType }
          $index = [array]::IndexOf($projectTypes, "${{ project.projectType }}")
          if ($index -ne 0) {
            $args += "--MultipleProjectType"
            $args += "true"
          }

          dotnet "$(Build.SourcesDirectory)/continuous-clearing/out/net8.0/SIT.Scan.dll" @args

  - task: PowerShell@2
    condition: eq('${{ parameters.SITScanEnabled }}', true)
    continueOnError: true
    displayName: 'Run SIT.Create'
    inputs:
      targetType: 'inline'
      script: |
        dotnet $(Build.SourcesDirectory)/continuous-clearing/out/net8.0/SIT.Create.dll `
          --Directory:OutputFolder "${{ parameters.outputFolder }}/sbom" `
          --Directory:LogFolder "${{ parameters.outputFolder }}/logs" `
          --SW360:ProjectName "${{ parameters.sw360ProjectName }}" `
          --SW360:ProjectID "${{ parameters.sw360ProjectId }}" `
          --SW360:AuthTokenType "Token" `
          --SW360:URL "${{ parameters.sw360Url }}" `
          --SW360:Token "${{ parameters.sw360Token }}" `
          --SW360:Fossology:URL "${{ parameters.fossologyUrl }}" `
          --SbomSigning:SBOMSignVerify "${{ parameters.SBOMSignVerify }}" `
          --SbomSigning:KeyVaultUri "${{ parameters.keyVaultUri }}" `
          --SbomSigning:CertificateName "${{ parameters.certificateName }}" `
          --SbomSigning:ClientId "${{ parameters.clientId }}" `
          --SbomSigning:ClientSecret "${{ parameters.clientSecret }}" `
          --SbomSigning:TenantId "${{ parameters.tenantId }}" `
          --settingsfilepath "${{ parameters.appSettingsPath }}"

  - task: PowerShell@2
    condition: eq('${{ parameters.SITUploadEnabled }}', true)
    continueOnError: true
    displayName: 'Run SIT.Upload'
    inputs:
      targetType: 'inline'
      script: |
        dotnet $(Build.SourcesDirectory)/continuous-clearing/out/net8.0/SIT.Upload.dll `
          --Directory:OutputFolder "${{ parameters.outputFolder }}/sbom" `
          --Directory:LogFolder "${{ parameters.outputFolder }}/logs" `
          --SW360:ProjectName "${{ parameters.sw360ProjectName }}" `
          --SW360:ProjectID "${{ parameters.sw360ProjectId }}" `
          --SW360:AuthTokenType "Token" `
          --SW360:URL "${{ parameters.sw360Url }}" `
          --SW360:Token "${{ parameters.sw360Token }}" `
          --JFrog:URL "${{ parameters.JfrogUrl }}" `
          --Jfrog:Token "${{ parameters.JfrogToken }}" `
          --JFrog:DryRun "${{ parameters.jfrogDryRun }}" `
          --SbomSigning:SBOMSignVerify "${{ parameters.SBOMSignVerify }}" `
          --SbomSigning:KeyVaultUri "${{ parameters.keyVaultUri }}" `
          --SbomSigning:CertificateName "${{ parameters.certificateName }}" `
          --SbomSigning:ClientId "${{ parameters.clientId }}" `
          --SbomSigning:ClientSecret "${{ parameters.clientSecret }}" `
          --SbomSigning:TenantId "${{ parameters.tenantId }}" `
          --settingsfilepath "${{ parameters.appSettingsPath }}"

  - task: PublishBuildArtifacts@1
    displayName: 'Publish SBOM Artifacts'
    inputs:
      PathtoPublish: '${{ parameters.outputFolder }}/sbom'
      ArtifactName: '$(System.StageName)_ContinuousClearing_Bom_Binary'
      publishLocation: 'Container'

  - task: PublishBuildArtifacts@1
    displayName: 'Publish Logs Artifacts'
    inputs:
      PathtoPublish: '${{ parameters.outputFolder }}/logs'
      ArtifactName: '$(System.StageName)_ContinuousClearing_Log_Binary'
      publishLocation: 'Container'